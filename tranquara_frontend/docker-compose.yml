
services:
  web-frontend:
      build:
        context: .
        dockerfile: ./Dockerfile.yml
      env_file:
        - .env
      ports:
        - 3000:3000
      restart: unless-stopped
      healthcheck:
        test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
        interval: 30s
        timeout: 5s
        retries: 3
        start_period: 10s